name: study_china
description: "Chinese character learning game for kindergarten children"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.4.9
  # Navigation
  go_router: ^12.1.1
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Audio
  audioplayers: ^5.2.1
  flutter_tts: ^4.0.2
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
